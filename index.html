<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H Wilson Task Tracker</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --today: #0891b2;
    --urgent: #dc2626;
    --property: #2563eb;
    --estate: #7c3aed;
    --personal: #16a34a;
    --erp: #d97706;
    --shopping: #db2777;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 12px;
  }

  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #eef2ff 0%, #fdf4ff 55%, #fff1f2 100%) fixed;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 55%, #db2777 100%);
    color: white;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    box-shadow: 0 2px 12px rgba(124,58,237,0.35);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
  header p { font-size: 0.8rem; color: rgba(255,255,255,0.85); margin-top: 2px; }

  .header-actions { display: flex; gap: 8px; margin-top: 2px; }
  .hdr-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #cbd5e1;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .hdr-btn:active { background: rgba(255,255,255,0.22); }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    white-space: nowrap;
    padding: 7px 14px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: white;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .filter-btn.active {
    color: white;
    border-color: transparent;
  }
  .filter-btn[data-cat="all"].active      { background: #1e293b; }
  .filter-btn[data-cat="today"].active    { background: var(--today); }
  .filter-btn[data-cat="urgent"].active   { background: var(--urgent); }
  .filter-btn[data-cat="property"].active { background: var(--property); }
  .filter-btn[data-cat="estate"].active   { background: var(--estate); }
  .filter-btn[data-cat="personal"].active { background: var(--personal); }
  .filter-btn[data-cat="erp"].active      { background: var(--erp); }
  .filter-btn[data-cat="shopping"].active { background: var(--shopping); }

  .add-area {
    margin: 16px;
    background: white;
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 16px;
    box-shadow: 0 4px 16px rgba(124,58,237,0.12);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    box-shadow: 0 3px 10px rgba(139,92,246,0.4);
    border: none;
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }
  #mic-btn.listening {
    background: #dc2626;
    animation: pulse 1s infinite;
  }
  #mic-btn.hidden { display: none; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(220,38,38,0); }
  }

  #task-input {
    flex: 1;
    min-width: 0;
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  #task-input:focus { border-color: #1e293b; }

  .bottom-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    align-items: center;
  }

  #cat-select {
    flex: 1;
    min-width: 0;
    padding: 11px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    background: white;
    outline: none;
    color: var(--text);
  }

  #save-btn {
    padding: 11px 22px;
    background: linear-gradient(135deg, #4f46e5, #a855f7);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(139,92,246,0.35);
    transition: opacity 0.15s;
  }
  #save-btn:active { opacity: 0.85; }

  #voice-status {
    font-size: 0.8rem;
    color: #dc2626;
    margin-top: 8px;
    min-height: 18px;
    font-style: italic;
    overflow-wrap: break-word;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 6px 20px 4px;
    margin-top: 8px;
  }

  .task-list { padding: 0 16px; }

  .task-card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    border-left-width: 5px;
    padding: 14px 14px 12px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    box-shadow: 0 2px 8px rgba(30,41,59,0.08);
    transition: opacity 0.2s;
  }
  .task-card.cat-today    { border-left-color: var(--today); }
  .task-card.cat-urgent   { border-left-color: var(--urgent); }
  .task-card.cat-property { border-left-color: var(--property); }
  .task-card.cat-estate   { border-left-color: var(--estate); }
  .task-card.cat-personal { border-left-color: var(--personal); }
  .task-card.cat-erp      { border-left-color: var(--erp); }
  .task-card.cat-shopping { border-left-color: var(--shopping); }
  .task-card.done { opacity: 0.55; }

  .task-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .task-card.done .task-check { background: #16a34a; border-color: #16a34a; color: white; }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 0.97rem;
    line-height: 1.4;
    word-wrap: break-word;
  }
  .task-card.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .cat-chip {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    color: white;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .cat-chip::after { content: ' ▾'; opacity: 0.8; }

  .cat-change-select {
    font-size: 0.78rem;
    padding: 2px 6px;
    border: 1.5px solid #2563eb;
    border-radius: 8px;
    background: white;
    color: var(--text);
    outline: none;
  }
  .cat-chip.today    { background: var(--today); }
  .cat-chip.urgent   { background: var(--urgent); }
  .cat-chip.property { background: var(--property); }
  .cat-chip.estate   { background: var(--estate); }
  .cat-chip.personal { background: var(--personal); }
  .cat-chip.erp      { background: var(--erp); }
  .cat-chip.shopping { background: var(--shopping); }

  .task-time { font-size: 0.72rem; color: var(--muted); }

  .task-del, .task-edit {
    background: none;
    border: none;
    color: #cbd5e1;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .task-del:hover  { color: #ef4444; }
  .task-edit:hover { color: #2563eb; }

  .edit-input {
    font-size: 0.97rem;
    line-height: 1.4;
    width: 100%;
    border: 1.5px solid #2563eb;
    border-radius: 6px;
    padding: 4px 8px;
    outline: none;
    font-family: inherit;
  }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 32px 20px;
  }

  .done-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    padding: 4px 20px;
    text-align: left;
    text-decoration: underline;
    display: block;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Task Tracker</h1>
    <p id="today-date"></p>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="exportTasks()">Export</button>
    <button class="hdr-btn" onclick="importTasks()">Import</button>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-cat="all">✨ All</button>
  <button class="filter-btn" data-cat="today">☀️ Today</button>
  <button class="filter-btn" data-cat="urgent">🔥 Urgent</button>
  <button class="filter-btn" data-cat="property">🏠 Property</button>
  <button class="filter-btn" data-cat="estate">📋 Estate &amp; Admin</button>
  <button class="filter-btn" data-cat="personal">🌱 Personal</button>
  <button class="filter-btn" data-cat="erp">💼 ERP Work</button>
  <button class="filter-btn" data-cat="shopping">🛒 Shopping</button>
</div>

<div class="add-area">
  <div class="input-row">
    <button id="mic-btn" title="Tap to speak">🎤</button>
    <input type="text" id="task-input" placeholder="Type a task or tap the mic…" autocomplete="off">
  </div>
  <div id="voice-status"></div>
  <div class="bottom-row">
    <select id="cat-select">
      <option value="today">☀️ Today</option>
      <option value="urgent">🔥 Urgent</option>
      <option value="property">🏠 Property</option>
      <option value="estate">📋 Estate &amp; Admin</option>
      <option value="personal">🌱 Personal</option>
      <option value="erp">💼 ERP Work</option>
      <option value="shopping">🛒 Shopping</option>
    </select>
    <button id="save-btn">Save</button>
  </div>
</div>

<div id="active-section">
  <div class="section-label">To Do</div>
  <div class="task-list" id="active-list"></div>
</div>

<div id="done-section" style="display:none">
  <button class="done-toggle" id="done-toggle">▶ Completed tasks</button>
  <div class="task-list" id="done-list" style="display:none"></div>
</div>

<script>
  // --- Date header ---
  const dateEl = document.getElementById('today-date');
  dateEl.textContent = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // --- State ---
  let tasks = JSON.parse(localStorage.getItem('hw_tasks') || '[]');
  let activeFilter = 'all';
  let doneOpen = false;
  let recognition = null;
  let autoSaveTimer = null;

  function save() {
    localStorage.setItem('hw_tasks', JSON.stringify(tasks));
  }

  // --- Category labels ---
  const CAT_LABELS = { today: 'Today', urgent: 'Urgent', property: 'Property', estate: 'Estate & Admin', personal: 'Personal', erp: 'ERP Work', shopping: 'Shopping' };
  const CAT_EMOJI = { today: '☀️', urgent: '🔥', property: '🏠', estate: '📋', personal: '🌱', erp: '💼', shopping: '🛒' };

  // --- Render ---
  function render() {
    const activeList = document.getElementById('active-list');
    const doneList = document.getElementById('done-list');
    const doneSection = document.getElementById('done-section');

    const filtered = activeFilter === 'all' ? tasks : tasks.filter(t => t.cat === activeFilter);
    const active = filtered.filter(t => !t.done);
    const done = filtered.filter(t => t.done);

    activeList.innerHTML = active.length ? active.map(taskHTML).join('') : '<div class="empty-msg">🎉 Nothing to do here! Tap the mic or type above to add a task.</div>';
    doneList.innerHTML = done.map(taskHTML).join('');
    doneSection.style.display = done.length ? '' : 'none';

    document.getElementById('done-toggle').textContent = (doneOpen ? '▼' : '▶') + ` Completed (${done.length})`;
    doneList.style.display = doneOpen ? '' : 'none';
  }

  function taskHTML(t) {
    const check = t.done ? '✓' : '';
    const time = new Date(t.ts).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    return `<div class="task-card cat-${t.cat} ${t.done ? 'done' : ''}" data-id="${t.id}">
      <div class="task-check" onclick="toggleDone('${t.id}')">${check}</div>
      <div class="task-body">
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-meta">
          <button class="cat-chip ${t.cat}" onclick="changeCat('${t.id}')" title="Change category">${CAT_EMOJI[t.cat]} ${CAT_LABELS[t.cat]}</button>
          <span class="task-time">${time}</span>
        </div>
      </div>
      <button class="task-edit" onclick="editTask('${t.id}')" title="Edit">✏</button>
      <button class="task-del" onclick="deleteTask('${t.id}')" title="Delete">✕</button>
    </div>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- Actions ---
  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) return;
    const cat = document.getElementById('cat-select').value;
    tasks.unshift({ id: Date.now().toString(), text, cat, done: false, ts: Date.now() });
    save();
    input.value = '';
    document.getElementById('voice-status').textContent = '';
    render();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  // --- Filter ---
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.cat;
      render();
    });
  });

  // --- Done toggle ---
  document.getElementById('done-toggle').addEventListener('click', () => {
    doneOpen = !doneOpen;
    render();
  });

  // --- Save button ---
  document.getElementById('save-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // --- Voice ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('mic-btn');
  const voiceStatus = document.getElementById('voice-status');

  if (!SpeechRecognition) {
    micBtn.classList.add('hidden');
    document.getElementById('task-input').placeholder = 'Type your task here…';
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-GB';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      micBtn.classList.add('listening');
      voiceStatus.textContent = 'Listening… speak your task';
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      document.getElementById('task-input').value = final || interim;
      if (final) {
        voiceStatus.textContent = 'Got it — tap Save or speak again';
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(addTask, 1500);
      }
    };

    recognition.onerror = (e) => {
      micBtn.classList.remove('listening');
      voiceStatus.textContent = e.error === 'not-allowed' ? 'Microphone permission denied — please allow access' : 'Could not hear — try again';
    };

    recognition.onend = () => {
      micBtn.classList.remove('listening');
    };

    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('listening')) {
        recognition.stop();
      } else {
        clearTimeout(autoSaveTimer);
        document.getElementById('task-input').value = '';
        voiceStatus.textContent = '';
        recognition.start();
      }
    });
  }

  // --- Edit ---
  function editTask(id) {
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    const textEl = card.querySelector('.task-text');
    const task = tasks.find(t => t.id === id);
    const input = document.createElement('input');
    input.type = 'text';
    input.value = task.text;
    input.className = 'edit-input';
    textEl.replaceWith(input);
    input.focus();
    input.select();

    let committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      const newText = input.value.trim();
      if (newText) { task.text = newText; save(); }
      render();
    }
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') { committed = true; render(); }
    });
    input.addEventListener('blur', commit);
  }

  // --- Change category ---
  function changeCat(id) {
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    const chip = card.querySelector('.cat-chip');
    const task = tasks.find(t => t.id === id);
    const select = document.createElement('select');
    select.className = 'cat-change-select';
    for (const [val, label] of Object.entries(CAT_LABELS)) {
      const opt = document.createElement('option');
      opt.value = val;
      opt.textContent = CAT_EMOJI[val] + ' ' + label;
      if (val === task.cat) opt.selected = true;
      select.appendChild(opt);
    }
    chip.replaceWith(select);
    select.focus();

    let committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      if (select.value !== task.cat) { task.cat = select.value; save(); }
      render();
    }
    select.addEventListener('change', commit);
    select.addEventListener('blur', commit);
  }

  // --- Export / Import ---
  function exportTasks() {
    const data = JSON.stringify(tasks, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tasks-backup.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importTasks() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) throw new Error();
          tasks = imported;
          save();
          render();
          voiceStatus.textContent = imported.length + ' tasks restored.';
          setTimeout(() => { voiceStatus.textContent = ''; }, 3000);
        } catch {
          alert('Could not read file — please use a tasks-backup.json exported from this app.');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // --- Init ---
  render();
</script>
</body>
</html>
